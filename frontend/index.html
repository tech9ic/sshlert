<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shhlert · Network Alerts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <div class="app-container">
        <header class="glass-panel">
            <div class="header-content">
                <h1>Shhlert<span class="dot">.</span></h1>
                <p>Alert Correlation and Noise Reduction for Network Operations</p>
            </div>
            <div class="sync-status">
                <span class="pulse-ring"></span>
                <span>Live Sync: <span id="last-updated">--</span></span>
            </div>
        </header>

        <main>
            <section class="metrics-grid">
                <div class="metric-card glass-panel">
                    <div class="metric-icon">⚠️</div>
                    <div class="metric-info">
                        <h3>Raw Alerts</h3>
                        <p id="total-alerts" class="metric-value">--</p>
                    </div>
                </div>
                <div class="metric-card glass-panel">
                    <div class="metric-icon">🧩</div>
                    <div class="metric-info">
                        <h3>Correlated Incidents</h3>
                        <p id="total-incidents" class="metric-value">--</p>
                    </div>
                </div>
                <div class="metric-card glass-panel highlight-card">
                    <div class="metric-icon">📉</div>
                    <div class="metric-info">
                        <h3>Noise Reduction</h3>
                        <p id="noise-reduction" class="metric-value">--</p>
                    </div>
                </div>
            </section>

            <section class="table-section glass-panel">
                <div class="table-header-control">
                    <h2>Active Incidents</h2>
                    <div class="controls-wrapper">
                        <div class="toggle-container">
                            <label class="toggle-switch">
                                <input type="checkbox" id="hide-resolved-toggle">
                                <span class="slider"></span>
                            </label>
                            <span>Hide Resolved</span>
                        </div>
                        <div class="search-box">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                            <input type="text" id="search-input" placeholder="Search devices, causes...">
                        </div>
                        <div class="filter-bar">
                            <select id="filter-device" class="global-filter">
                                <option value="">All Devices</option>
                            </select>
                            <select id="filter-severity" class="global-filter">
                                <option value="">All Severities</option>
                                <option value="Critical">Critical</option>
                                <option value="Major">Major</option>
                                <option value="Minor">Minor</option>
                                <option value="Warning">Warning</option>
                                <option value="Info">Info</option>
                            </select>
                            <select id="filter-cause" class="global-filter">
                                <option value="">All Causes</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="table-wrapper">
                    <table id="incidents-table">
                        <thead>
                            <tr>
                                <th data-sort="incident_id">Incident ID <span class="sort-icon">↕</span></th>
                                <th data-sort="device">Device <span class="sort-icon">↕</span></th>
                                <th data-sort="start_time">Time <span class="sort-icon">↕</span></th>
                                <th data-sort="alerts_count">Alerts <span class="sort-icon">↕</span></th>
                                <th data-sort="severity">Severity <span class="sort-icon">↕</span></th>
                                <th data-sort="root_cause">Root Cause <span class="sort-icon">↕</span></th>
                                <th data-sort="duration">Duration <span class="sort-icon">↕</span></th>
                                <th>Management Panel</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
